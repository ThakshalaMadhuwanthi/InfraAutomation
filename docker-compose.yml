---
services:
  mongodb:
    image: mongo
    environment:
       MONGO_INITDB_ROOT_USERNAME: admin
       MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "27017:27017"

  mongoexpress:
    image: mongo-express
    environment:
       ME_CONFIG_MONGODB_SERVER: mongodb
       ME_CONFIG_MONGODB_ADMINUSERNAME: admin
       ME_CONFIG_MONGODB_ADMINPASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:admin@mongodb:27017
    depends_on:
      - mongodb

  frontend:
     build: ./frontend
     ports:
       - "3000:3000"
     depends_on:
       - backend



 